<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OutreachPilot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header class="op-header">
    <div class="op-logo">
      <img src="icons/icon32.png" alt="OutreachPilot" class="op-logo-img" />
      <span class="op-logo-text">Outreach<strong>Pilot</strong></span>
    </div>
    <div id="badgePro" class="op-badge op-badge--pro" style="display:none">PRO</div>
    <div id="badgeFree" class="op-badge op-badge--free">FREE</div>
  </header>

  <div id="statusBanner" class="op-status op-status--scanning">
    <span id="statusText">Scanning page…</span>
  </div>

  <div id="usageSection" class="op-usage-section" style="display:none">
    <div class="op-usage-label">
      <span>Scans today</span>
      <span id="usageCount">0 / 10</span>
    </div>
    <div class="op-usage-track">
      <div id="usageBar" class="op-usage-bar" style="width:0%"></div>
    </div>
  </div>

  <div id="actionsSection" class="op-actions" style="display:none">
    <button id="btnScan" class="op-btn op-btn--primary" disabled>
      🔍 Find Emails &amp; Phones
    </button>
    <button id="btnDeepScan" class="op-btn op-btn--pro-action" disabled>
      🕵️ Deep Scan (Contact + About) <span class="op-pro-tag">PRO</span>
    </button>
  </div>

  <div id="progressSection" class="op-progress-section" style="display:none">
    <div class="op-spinner"></div>
    <span id="progressText">Scanning…</span>
  </div>

  <div id="resultsSection" class="op-results-section" style="display:none">
    <div id="siteInfo" class="op-site-info"></div>

    <div id="emailsBlock" style="display:none">
      <div class="op-block-header">
        <span class="op-block-title">📧 Emails</span>
        <button id="btnCopyEmails" class="op-btn op-btn--copy">Copy All</button>
      </div>
      <div id="emailsList" class="op-contact-list"></div>
    </div>

    <div id="phonesBlock" style="display:none">
      <div class="op-block-header">
        <span class="op-block-title">📞 Phones</span>
        <button id="btnCopyPhones" class="op-btn op-btn--copy">Copy All</button>
      </div>
      <div id="phonesList" class="op-contact-list"></div>
    </div>

    <div id="noResults" style="display:none" class="op-no-results">
      No emails or phones found on this page.
    </div>

    <button id="btnCopyAll" class="op-btn op-btn--copy-all" style="display:none">
      ⧉ Copy Everything
    </button>
  </div>

  <div id="upgradeSection" class="op-upgrade" style="display:none">
    <div class="op-upgrade-copy">
      <strong>Upgrade to Pro — $9/month</strong><br/>
      Unlimited scans · Deep scan (contact + about pages)
    </div>
    <a href="https://gumroad.com/l/outreachpilot" target="_blank" class="op-btn op-btn--upgrade">
      Upgrade Now →
    </a>
    <div class="op-license-row">
      <input id="licenseInput" class="op-input" type="text" placeholder="OP-XXXX-XXXX-XXXX" />
      <button id="btnActivate" class="op-btn op-btn--activate">Activate</button>
    </div>
    <div id="licenseMsg" class="op-license-msg" style="display:none"></div>
  </div>

  <div id="proSection" class="op-pro-section" style="display:none">
    <span id="proKeyDisplay" class="op-pro-key"></span>
    <button id="btnDeactivate" class="op-btn op-btn--deactivate">Remove</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
